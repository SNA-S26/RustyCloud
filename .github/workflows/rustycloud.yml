name: CI/CD Pipeline

on:
  push:
    # Trigger the workflow only on the specified branch
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    # Using a self-hosted runner to access local resources (Mongo, Redis)
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Build image from the /app directory and tag it
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      - name: Start container for testing
        run: |
          # Ensure a clean environment by removing existing test containers
          docker rm -f test-app || true

          # Use host networking so the container can access MongoDB/Redis on the runner's localhost
          docker run -d --name test-app \
            --network="host" \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="./test_storage" \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest
          
          # Wait for the application to initialize database connections
          sleep 10
          
          # Debugging: check if the container is running and print logs for verification
          docker ps
          docker logs test-app

      - name: Run functional tests
        run: |
          # Install dependencies and execute the test suite
          pip install requests pytest
          pytest tests/test_routes.py

      - name: Stop testing container
        if: always() # Ensure cleanup happens even if the tests fail
        run: |
          docker stop test-app || true
          docker rm test-app || true

  deploy:
    # This job only executes if the build-and-test job passes
    needs: build-and-test
    runs-on: self-hosted
    
    steps:
      - name: Deploy to Server via SSH
        run: |
          # Securely connect to the production server using stored secrets
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            
            # Navigate to the project directory
            cd ~/RustyCloud

            # Dynamically create the .env file with current secrets
            cat > .env << EOL
            MONGODB_USER=${{ secrets.MONGODB_USER }}
            MONGODB_PASS=${{ secrets.MONGODB_PASS }}
            NFS_SERVER=${{ secrets.NFS_SERVER }}
            NFS_MOUNT_POINT=${{ secrets.NFS_MOUNT_POINT }}
            EOL

            # Restrict permissions and execute the deployment script
            chmod 600 .env
            ./deploy.sh
          EOF