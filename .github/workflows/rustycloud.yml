name: CI/CD Pipeline

on:
  push:
    # Trigger the workflow only on pushes to the CI/CD-Reliability branch
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    # Using the local machine runner to perform tasks
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Build the image using the Dockerfile located in the /app directory
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          # Push the newly built image to the Docker Hub repository
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      - name: Start container for testing
        run: |
          # 1. Clean up old attempts
          docker rm -f test-app || true

          # 2. Run with host network AND verify the binary name
          # We use 0.0.0.0 or the host IP to ensure it's not looping back to an empty container
          docker run -d --name test-app \
            --network="host" \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="./test_storage" \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest
          
          # 3. Check if the container actually stayed alive
          sleep 10
          docker ps
          docker logs test-app

      - name: Run functional tests
        run: |
          # Ensure Python dependencies are available and execute the test suite
          pip install requests pytest
          pytest tests/test_routes.py

      - name: Stop testing container
        if: always() # Ensure cleanup happens even if tests fail
        run: |
          docker stop test-app || true
          docker rm test-app || true

  deploy:
    # This job only runs if the build and test stages pass successfully
    needs: build-and-test
    runs-on: self-hosted
    
    steps:
      - name: Deploy to Server via SSH
        run: |
          # Connect to the remote server using the SERVER_IP secret
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            
            # Navigate to the project directory on the server
            cd ~/RustyCloud

            # Generate the .env file dynamically from GitHub Secrets
            cat > .env << EOL
            MONGODB_USER=${{ secrets.MONGODB_USER }}
            MONGODB_PASS=${{ secrets.MONGODB_PASS }}
            NFS_SERVER=${{ secrets.NFS_SERVER }}
            NFS_MOUNT_POINT=${{ secrets.NFS_MOUNT_POINT }}
            EOL

            # Set secure file permissions and launch the deployment script
            chmod 600 .env
            ./deploy.sh
          EOF