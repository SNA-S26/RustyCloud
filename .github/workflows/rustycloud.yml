name: CI/CD Pipeline

on:
  push:
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Pointing to the app directory where Dockerfile is located
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      - name: Start container for testing
        run: |
          # 1. Cleanup: Remove any existing test container
          docker rm -f test-app || true

          # 2. Start container using HOST networking
          # This allows '127.0.0.1' inside the app to point to the host's Mongo/Redis
          docker run -d --name test-app \
            --network="host" \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="./test_storage" \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest
          
          # 3. Wait for the Rust app to finish its internal startup
          sleep 15
          
          # 4. Check if the app is still alive
          docker ps
          
          # 5. VERY IMPORTANT: If it's not working, these logs will tell you why it crashed
          docker logs test-app

      - name: Run functional tests
        run: |
          # Ensure dependencies are present
          pip install requests pytest
          # Use the correct relative path to your test file
          pytest tests/test_routes.py

      - name: Stop testing container
        if: always() 
        run: |
          docker stop test-app || true
          docker rm test-app || true

  deploy:
    # This job only executes if the build-and-test job passes
    needs: build-and-test
    runs-on: self-hosted
    
    steps:
      - name: Deploy to Server via SSH
        run: |
          # Securely connect to the production server using stored secrets
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            
            # Navigate to the project directory
            cd ~/RustyCloud

            # Dynamically create the .env file with current secrets
            cat > .env << EOL
            MONGODB_USER=${{ secrets.MONGODB_USER }}
            MONGODB_PASS=${{ secrets.MONGODB_PASS }}
            NFS_SERVER=${{ secrets.NFS_SERVER }}
            NFS_MOUNT_POINT=${{ secrets.NFS_MOUNT_POINT }}
            EOL

            # Restrict permissions and execute the deployment script
            chmod 600 .env
            ./deploy.sh
          EOF