name: CI/CD Pipeline

on:
  push:
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Pointing to the app directory where Dockerfile is located
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      - name: Start container
        run: |
          docker rm -f test-app || true
          # Kill anything already on 8080 just in case
          sudo fuser -k 8080/tcp || true 
          
          mkdir -p /home/dbayazitov/test_storage
          chmod 777 /home/dbayazitov/test_storage
          
          docker run -d --name test-app \
            --network="host" \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="/home/dbayazitov/test_storage" \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest \
            /usr/local/bin/RustyCloud 8080 # Force the binary to use 8080
          
          sleep 15 # Give it a bit more time to bind to the port

      - name: Verify Application Health
        if: always()
        run: |
          echo "--- Container Status ---"
          docker ps -a
          echo "--- Application Logs (Startup Check) ---"
          docker logs test-app

      - name: Run functional tests
        run: |
          # Ensure dependencies are present for the Python test script
          pip install requests pytest
          # Execute tests against the server listening on port 80
          pytest tests/test_routes.py

      - name: Stop testing container
        if: always() 
        run: |
          docker stop test-app || true
          docker rm test-app || true

  deploy:
    # This job only executes if the build-and-test job passes
    needs: build-and-test
    runs-on: self-hosted
    
    steps:
      - name: Deploy to Server via SSH
        run: |
          # Securely connect to the production server using stored secrets
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            
            # Navigate to the project directory
            cd ~/RustyCloud

            # Dynamically create the .env file with current secrets
            cat > .env << EOL
            MONGODB_USER=${{ secrets.MONGODB_USER }}
            MONGODB_PASS=${{ secrets.MONGODB_PASS }}
            NFS_SERVER=${{ secrets.NFS_SERVER }}
            NFS_MOUNT_POINT=${{ secrets.NFS_MOUNT_POINT }}
            EOL

            # Restrict permissions and execute the deployment script
            chmod 600 .env
            ./deploy.sh
          EOF