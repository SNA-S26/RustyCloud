name: CI/CD Pipeline

on:
  push:
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. CLEANUP: Clear out lingering containers
      - name: Stop and remove all existing containers
        run: |
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true
          docker network prune -f

      # 2. PORT LIBERATION: Stop host services that might conflict
      - name: Stop Host Services
        run: |
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl stop mongod || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl stop redis || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl stop nginx || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl stop apache2 || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 27017/tcp || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 6379/tcp || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 80/tcp || true

      # 3. DATABASES: Start fresh test instances
      - name: Start Database Services
        run: |
          docker run -d --name mongodb-test -p 27017:27017 mongo:latest
          docker run -d --name redis-test -p 6379:6379 redis:latest
          sleep 10 

      # 4. STORAGE PREP: Create the directory for the NFS mount simulation
      - name: Prepare Local Storage
        run: mkdir -p ${{ github.workspace }}/storage

      # 5. DOCKER AUTH
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. BUILD: PATH CHANGE HERE
      # Your tree shows Dockerfile is in ./app/
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      # 7. TEST RUN: Start the container
      - name: Start RustyCloud container for testing
        run: |
          docker run -d \
            --name rustycloud-test \
            --network host \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="/app/storage" \
            -v ${{ github.workspace }}/storage:/app/storage:Z \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest 80
          
          echo "Waiting for RustyCloud to respond on port 80..."
          for i in {1..15}; do
            if curl -s http://127.0.0.1:80/signup > /dev/null; then
              echo "Server is responding!"
              break
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done

      # 8. VERIFICATION: Target the tests folder
      - name: Run functional tests
        run: |
          pip install requests pytest
          pytest tests/test_routes.py

      # 9. DEBUG: Enhanced log check
      - name: Debug logs on failure
        if: failure()
        run: |
          docker logs rustycloud-test
          # Checking internal paths based on your Dockerfile/Tree
          docker exec rustycloud-test ls -R /app || echo "App directory issue"

      # 10. POST-TEST CLEANUP
      - name: Stop testing containers
        if: always() 
        run: |
          docker stop rustycloud-test mongodb-test redis-test || true
          docker rm rustycloud-test mongodb-test redis-test || true

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Deploy to Production Server
        run: |
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            mkdir -p ~/RustyCloud
            cd ~/RustyCloud
            cat > .env << EOL
            MONGODB_URI=${{ secrets.PROD_MONGODB_URI }}
            REDIS_URI=${{ secrets.PROD_REDIS_URI }}
            NFS_MOUNT_POINT="/app/storage"
            EOL
            chmod 600 .env
            # deploy.sh is in the project root, so ensure it's on the server
            ./deploy.sh
          EOF