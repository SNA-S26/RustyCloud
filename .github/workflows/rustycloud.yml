name: CI/CD Pipeline

on:
  push:
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. CLEANUP: Clear out containers using the specific port
      - name: Stop and remove conflicting containers
        run: |
          # Find container IDs using port 8080 and remove them
          CONTAINER_IDS=$(docker ps -q --filter "publish=8080")
          if [ ! -z "$CONTAINER_IDS" ]; then
            echo "Stopping containers using 8080: $CONTAINER_IDS"
            docker stop $CONTAINER_IDS
            docker rm -f $CONTAINER_IDS
          fi
          
          # Also remove by name if they exist but aren't on that port
          docker stop rustycloud-test || true
          docker rm -f rustycloud-test || true
          docker network prune -f

      # 2. PORT LIBERATION: Kill host processes on 8080
      - name: Stop Host Services
        run: |
          # Kill any non-docker process (like a manual cargo run) using 8080
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 8080/tcp || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 27017/tcp || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 6379/tcp || true

      # 3. DATABASES: Start on a dedicated network
      - name: Start Database Services
        run: |
          docker network create rustycloud-net || true
          docker run -d --name mongodb-test --network rustycloud-net -p 27017:27017 mongo:latest
          docker run -d --name redis-test --network rustycloud-net -p 6379:6379 redis:latest
          sleep 10 

      # 4. STORAGE PREP: Create the directory for the NFS mount simulation
      - name: Prepare Local Storage
        run: mkdir -p ${{ github.workspace }}/storage

      # 5. DOCKER AUTH
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. BUILD: PATH CHANGE HERE
      # Your tree shows Dockerfile is in ./app/
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      # 7. TEST RUN: Map the port instead of using --network host
      - name: Start RustyCloud container for testing
        run: |
          docker run -d \
            --name rustycloud-test \
            --network rustycloud-net \
            -p 8080:8080 \
            -e MONGODB_URI="mongodb://mongodb-test:27017" \
            -e REDIS_URI="redis://redis-test:6379" \
            -e NFS_MOUNT_POINT="/app/storage" \
            -v ${{ github.workspace }}/storage:/app/storage:Z \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest 8080
          
          echo "Waiting for RustyCloud to respond..."
          for i in {1..20}; do
            # Use -I to just fetch headers and check for 200 OK
            if curl -s -I http://127.0.0.1:8080/ | grep "200 OK" > /dev/null; then
              echo "Server is UP!"
              break
            fi
            echo "Server not ready yet... ($i/20)"
            docker ps -a | grep rustycloud-test # Check if container died
            sleep 2
          done

      # 8. VERIFICATION: Target the tests folder
      - name: Run functional tests
        run: |
          pip install requests pytest
          pytest tests/test_routes.py

      # 9. DEBUG: Enhanced log check
      - name: Debug logs on failure
        if: failure()
        run: |
          echo "=== CONTAINER STATUS ==="
          docker ps -a
          echo "=== CONTAINER LOGS ==="
          docker logs rustycloud-test
          echo "=== NETWORK CHECK ==="
          sudo netstat -tulpn | grep 8080 || echo "Port 8080 is NOT listening!"

      # 10. POST-TEST CLEANUP
      - name: Stop testing containers
        if: always() 
        run: |
          docker stop rustycloud-test mongodb-test redis-test || true
          docker rm rustycloud-test mongodb-test redis-test || true

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Need this to access deploy.sh

      - name: Copy script and deploy
        run: |
          # 1. Copy the deploy script to the server
          scp root@${{ secrets.SERVER_IP }}:~/RustyCloud/deploy.sh ./deploy.sh
          
          # 2. Run the remote commands
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            mkdir -p ~/RustyCloud
            cd ~/RustyCloud
            
            # Create the env file
            cat > .env << EOL
            MONGODB_URI=${{ secrets.PROD_MONGODB_URI }}
            REDIS_URI=${{ secrets.PROD_REDIS_URI }}
            NFS_MOUNT_POINT="/app/storage"
            EOL
            
            chmod 600 .env
            chmod +x deploy.sh
            ./deploy.sh
          EOF