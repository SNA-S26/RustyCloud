name: CI/CD Pipeline

on:
  push:
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. CLEANUP: Stop all containers
      - name: Stop and remove all existing containers
        run: |
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true
          docker network prune -f

      # 2. FORCE PORT LIBERATION: Fixes "address already in use"
      - name: Stop Host Database Services
        run: |
          echo "Force-killing any process on database ports..."
          # Fix: Pipe the password into sudo -S
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl stop mongod || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl stop redis || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 27017/tcp || true
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S fuser -k 6379/tcp || true

      # 3. DATABASE: Start isolated Docker containers
      - name: Start Database Services
        run: |
          docker run -d --name mongodb-test -p 27017:27017 mongo:latest
          docker run -d --name redis-test -p 6379:6379 redis:latest
          sleep 10

      # 4. AUTH & PULL: Login and pre-pull base images to fix "access denied"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pre-pull base images
        run: |
          docker pull rustlang/rust:nightly-slim
          docker pull debian:bookworm-slim

      # 5. BUILD: Create and push the image
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      # 6. TEST RUN: Start the app container
      - name: Start RustyCloud container for testing
        run: |
          # Use host network to reach DB containers and allow pytest to reach the app
          docker run -d --network="host" \
            --name rustycloud-test \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="/app/storage" \
            -v /home/dbayazitov/Downloads/sna/project/RustyCloud:/app/storage \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./RustyCloud 8080
          
          echo "Waiting for RustyCloud to bind to port 8080..."
          # A loop is safer than a flat 'sleep'
          for i in {1..10}; do
            if curl -s http://127.0.0.1:8080/ > /dev/null; then
              echo "RustyCloud is UP!"
              break
            fi
            echo "Still waiting... ($i/10)"
            sleep 3
          done

      # 7. VERIFICATION: Execute functional Python tests
      - name: Run functional tests
        run: |
          # Ensure dependencies are present
          pip install requests pytest
          # Target the local instance established in step 6
          pytest tests/test_routes.py

      # 8. DEBUG: Collect information if the run fails
      - name: Debug logs on failure
        if: failure()
        run: |
          echo "--- Application Logs ---"
          docker logs rustycloud-test
          echo "--- Network Status ---"
          # Check if anything is actually listening on 8080
          sudo ss -tulpn | grep :8080 || echo "Nothing listening on 8080"

      # 9. POST-TEST CLEANUP
      - name: Stop testing containers
        if: always() 
        run: |
          docker stop rustycloud-test mongodb-test redis-test || true
          docker rm rustycloud-test mongodb-test redis-test || true

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Deploy to Production Server
        run: |
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            cd ~/RustyCloud
            cat > .env << EOL
            MONGODB_URI=${{ secrets.PROD_MONGODB_URI }}
            REDIS_URI=${{ secrets.PROD_REDIS_URI }}
            NFS_MOUNT_POINT=${{ secrets.NFS_MOUNT_POINT }}
            EOL
            chmod 600 .env
            ./deploy.sh
          EOF