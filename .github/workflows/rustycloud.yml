name: CI/CD Pipeline

on:
  push:
    branches: [ "CI/CD-Reliability" ] 

jobs:
  build-and-test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # New Step: Kill and remove ALL containers to ensure a clean state
      - name: Stop and remove all existing containers
        run: |
          echo "Cleaning up all Docker containers on the runner..."
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true

      # Fix for unstable mongod: force restart services on the host
      - name: Ensure Host Services are Running
        run: |
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart mongod
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart redis

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Build context is the 'app' directory as per Dockerfile 
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest

      - name: Start container for testing
        run: |
          # Run container using host network to access MongoDB/Redis on 127.0.0.1
          # Pass '8080' as an argument to match test_routes.py
          docker run -d --network="host" \
            --name rustycloud-test \
            -e MONGODB_URI="mongodb://127.0.0.1:27017" \
            -e REDIS_URI="redis://127.0.0.1:6379" \
            -e NFS_MOUNT_POINT="/app/storage" \
            -v /home/dbayazitov/Downloads/sna/project/RustyCloud:/app/storage \
            ${{ secrets.DOCKERHUB_USERNAME }}/rustycloud:latest ./RustyCloud 8080
          
          # Wait for the application to initialize database connections
          sleep 10

      - name: Run functional tests
        run: |
          # Ensure dependencies are present for the Python test script
          pip install requests pytest
          # Execute tests against the server listening on port 8080
          pytest tests/test_routes.py

      - name: Debug logs on failure
        if: failure()
        run: |
          echo "--- Application Logs ---"
          docker logs rustycloud-test
          echo "--- Database Status ---"
          systemctl status mongod

      - name: Stop testing container
        if: always() 
        run: |
          docker stop rustycloud-test || true
          docker rm rustycloud-test || true

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Deploy to Server via SSH
        run: |
          ssh root@${{ secrets.SERVER_IP }} << 'EOF'
            set -euo pipefail
            cd ~/RustyCloud

            # Create .env with necessary production secrets
            cat > .env << EOL
            MONGODB_URI=${{ secrets.PROD_MONGODB_URI }}
            REDIS_URI=${{ secrets.PROD_REDIS_URI }}
            NFS_MOUNT_POINT=${{ secrets.NFS_MOUNT_POINT }}
            EOL

            chmod 600 .env
            # Execute deployment using port 8080 as defined in deploy.sh 
            ./deploy.sh
          EOF