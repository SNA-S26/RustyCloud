<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sign Up</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f0eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        h1 {
            transition-duration: 1s;
            color: coral;
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(255, 127, 80, 0.25);
        }

        h1:hover {
            text-shadow: 0 2px 8px rgba(255, 127, 80, 0.5);
            transition-duration: 1s;
        }

        .subtitle {
            color: rgba(170, 170, 170);
            font-size: 14px;
            margin-bottom: 28px;
            transition-duration: 1s;
        }

        .card {
            background-color: rgb(255, 250, 245);
            padding: 40px 30px;
            width: 500px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(175, 47, 0, 0.08);
        }

        .input {
            display: block;
            width: 80%;
            margin: 0 auto 14px;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #e0d6cc;
            border-radius: 8px;
            background: white;
            outline: none;
            font-family: inherit;
            transition-duration: 300ms;
        }

        .input:focus {
            border-color: coral;
            box-shadow: 0 0 0 3px rgba(255, 127, 80, 0.15);
            transition-duration: 300ms;
        }

        .button {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin: 10px auto;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            width: 80%;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .signup {
            background-color: coral;
            box-shadow: 0 2px 8px rgba(255, 127, 80, 0.25);
            transition-duration: 300ms;
        }

        .signup:hover {
            background-color: #e67348;
            transition-duration: 300ms;
        }

        .login {
            display: block;
            font-size: 14px;
            color: grey;
            text-decoration: none;
            margin-top: 8px;
            transition-duration: 300ms;
        }

        .login:hover {
            transition-duration: 300ms;
            color: coral;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>RustyCloud</h1>
        <p class="subtitle">Let's get started 🦀</p>

        {% if error %}
            <div style="color: red; margin-bottom: 15px;">{{error}}</div>
        {% endif %}

        <form action="/signup" method="post">
            <input class="input" type="text" name="username" placeholder="Username" required>
            <input class="input" type="password" name="password" placeholder="Password" required>
            <button class="button signup" type="submit">Sign Up</button>
        </form>

        <a href="/" class="login">Already have an account? Log in</a>
    </div>
</body>
</html>
