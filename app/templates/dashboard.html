<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f0eb;
            min-height: 100vh;
            padding: 40px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont,
                'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
                'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background-color: rgb(255, 250, 245);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(175, 47, 0, 0.08);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
        }

        /* Новый контейнер для кнопок управления в шапке */
        .top-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        h1 {
            transition-duration: 1s;
            color: coral;
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(255, 127, 80, 0.25);
        }

        h1:hover {
            text-shadow: 0 2px 8px rgba(255, 127, 80, 0.5);
            transition-duration: 1s;
        }

        .subtitle {
            color: rgba(170, 170, 170);
            font-size: 14px;
            margin-bottom: 28px;
            transition-duration: 1s;
        }

        .upload-button {
            width: 100px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 127, 80, 0.5);
            color: white;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 34px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 2px 8px rgba(255, 127, 80, 0.25);
            transition-duration: 300ms;
        }

        .upload-button:hover {
            background: rgb(230, 115, 72);
            transform: translateY(-2px);
        }

        /* Стиль для новой кнопки Exit */
        .exit-button {
            height: 40px;
            padding: 0 20px;
            border: 1px solid rgba(255, 127, 80, 0.4);
            border-radius: 10px;
            background: transparent;
            color: coral;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition-duration: 300ms;
        }

        .exit-button:hover {
            background: rgba(255, 127, 80, 0.08);
            transform: translateY(-2px);
        }

        .files {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-entry {
            background: white;
            border: 1px solid #eee2d7;
            border-radius: 18px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition-duration: 300ms;
        }

        .file-entry:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(175, 47, 0, 0.08);
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .file-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .file-meta {
            font-size: 13px;
            color: #999;
        }

        .file-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .file-date {
            font-size: 13px;
            color: #b5aba2;
            white-space: nowrap;
        }

        .delete-button {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            background: rgba(255, 127, 80, 0.12);
            color: coral;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition-duration: 300ms;
        }

        .delete-button:hover {
            background: rgba(255, 127, 80, 0.2);
        }

        .empty {
            text-align: center;
            padding: 40px 0;
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">

            <div class="top-bar">
                <div>
                    <h1>RustyCloud</h1>
                    <div class="subtitle">{{username}}</div>
                </div>

                <!-- Контейнер объединяет Upload и Exit в одну линию -->
                <div class="top-actions">
                    <form id="upload-form" action="/upload-file" method="post" enctype="multipart/form-data">
                        <label for="file-upload" class="upload-button">Upload</label>
                        <input id="file-upload" type="file" name="file" onchange="document.getElementById('upload-form').submit()">
                    </form>

                    <form action="/logout" method="post">
                        <button class="exit-button" type="submit">Exit</button>
                    </form>
                </div>
            </div>

            <div class="files">

                {% for file in files %}
                    <div class="file-entry">

                        <div class="file-info">
                            <div class="file-name">
                                {{ file.name }}
                            </div>
                            <div class="file-meta">
                                {{ file.size | filesizeformat }}
                            </div>
                        </div>

                        <div class="file-actions">
                            <div class="file-date">
                                {{ file.created_at }}
                            </div>

                            <form action="/delete-file" method="post">
                                <input type="hidden" name="filename" value="{{ file.name }}">
                                <button class="delete-button" type="submit">Delete</button>
                            </form>
                        </div>

                    </div>
                {% endfor %}

                {% if files | length == 0 %}
                    <div class="empty">
                        No files uploaded yet
                    </div>
                {% endif %}

            </div>
        </div>
    </div>
</body>
</html>
