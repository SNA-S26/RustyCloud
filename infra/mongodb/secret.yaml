# Mongo secrets(credentials for authentication)
# Username and password are encoded in base64

apiVersion: v1
kind: Secret
metadata:
  name: mongo-creds # used by statefulset to pull credentials
  namespace: database
type: Opaque # Generic secret type to store key-value pairs
data:
  username: YWRtaW4= # username: admin
  password: YWRtaW4= # password: admin